<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Tabs</title>
</head>
<body>
    <main>
       <section class="main-tab">
         <div class="tabs-section">
             <div class="tabs-container">
                 <ul class="tab-menu">
                    <li><a href="#" data-tab="1" class="nav show-content">Frist Tab</a></li>
                    <li><a href="#" data-tab="2" class="nav">Second Tab</a></li>
                    <li><a href="#" data-tab="3" class="nav">Third Tab</a></li>
                    <li><a href="#" data-tab="4" class="nav">Fourth Tab</a></li>
                    <span class="span"></span>
                 </ul>

                 <div class="container-cont">
                     <p id="tab1" class="tabs-content show-content">First Tab content to be displayed here.</p>
                     <p id="tab2" class="tabs-content">Second Tab content to be displayed here.</p>
                     <p id="tab3" class="tabs-content">Third Tab content to be displayed here.</p>
                     <p id="tab4" class="tabs-content">Fourth Tab content to be displayed here.</p>
                 </div>
             </div>

         </div>
       </section>
    </main>
    <script defer src="index.js"></script>
</body>
</html>
